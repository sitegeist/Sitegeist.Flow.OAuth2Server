privilegeTargets:
  'Neos\Flow\Security\Authorization\Privilege\Method\MethodPrivilege':
    'Sitegeist.Flow.OAuthServer:AccessToken':
      matcher: 'method(Sitegeist\Flow\OAuthServer\Application\Controller\AccessTokenController->.*Action())'
    'Sitegeist.Flow.OAuthServer:Authorize':
      matcher: 'method(Sitegeist\Flow\OAuthServer\Application\Controller\AuthorizeController->.*Action())'

roles:
  'Neos.Flow:Everybody':
    privileges:
      -
        privilegeTarget: 'Sitegeist.Flow.OAuthServer:AccessToken'
        permission: GRANT
  'Neos.Flow:AuthenticatedUser':
    privileges:
      -
        privilegeTarget: 'Sitegeist.Flow.OAuthServer:Authorize'
        permission: GRANT
